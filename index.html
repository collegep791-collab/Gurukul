<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gurukul — Modern Scholar Platform</title>
    <meta name="description" content="Gurukul is a modern academic resource management and collaboration platform. Upload resources, collaborate in real-time chat, take scholarly notes, and track assignments." />
    <meta property="og:title" content="Gurukul — Modern Scholar Platform" />
    <meta property="og:description" content="Elevate your academic journey with real-time collaboration, resource management, and intelligent course tracking." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Gurukul — Modern Scholar Platform" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            corePlugins: { preflight: false },
            theme: {
                extend: {
                    "colors": {
                        "background": "#f9f9ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e2dfff",
                        "on-primary-fixed-variant": "#3323cc",
                        "inverse-on-surface": "#ecf1ff",
                        "primary": "#3525cd",
                        "surface-container-highest": "#d8e3fb",
                        "secondary-container": "#d0e1fb",
                        "outline": "#777587",
                        "on-tertiary-container": "#67f4b7",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-tertiary-fixed": "#002113",
                        "tertiary-fixed-dim": "#4edea3",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9ff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#c3c0ff",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface-bright": "#f9f9ff",
                        "surface-container": "#e7eeff",
                        "on-primary-fixed": "#0f0069",
                        "tertiary-container": "#006e4b",
                        "inverse-surface": "#263143",
                        "on-background": "#111c2d",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-variant": "#d8e3fb",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#005338",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f0f3ff",
                        "on-primary-container": "#dad7ff",
                        "secondary": "#505f76",
                        "surface-tint": "#4d44e3",
                        "on-secondary-fixed-variant": "#38485d",
                        "primary-container": "#4f46e5",
                        "on-surface-variant": "#464555",
                        "surface-container-high": "#dee8ff",
                        "outline-variant": "#c7c4d8",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#d3e4fe",
                        "on-secondary-container": "#54647a",
                        "on-surface": "#111c2d",
                        "surface-dim": "#cfdaf2",
                        "on-secondary-fixed": "#0b1c30",
                        "tertiary-fixed": "#6ffbbe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
  </head>
  <body>
    <script>
      // Apply dark mode instantly before React loads to prevent flash
      if (localStorage.getItem('gurukul-theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
