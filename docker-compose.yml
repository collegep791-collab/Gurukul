services:
  gurukul:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data    # Persist SQLite database
      - ./uploads:/app/uploads # Persist uploaded resources & assignments
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=gurukul-production-secret-change-me
      - PORT=3001
    restart: unless-stopped
